version: "3.9"

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: atlas_uraba_db
    environment:
      POSTGRES_DB: atlas_uraba
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_uraba"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
